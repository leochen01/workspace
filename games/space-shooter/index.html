<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空战机 - 双人对战 🛸🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0f0f2a 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 2.2rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 15px;
        }

        .player-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 12px;
            min-width: 200px;
        }

        .player-info.p1 {
            border: 2px solid #00ff88;
        }

        .player-info.p2 {
            border: 2px solid #ff6b6b;
        }

        .player-info h3 {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .player-info.p1 h3 {
            color: #00ff88;
        }

        .player-info.p2 h3 {
            color: #ff6b6b;
        }

        .player-info .score {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-bar-fill.p1 {
            background: linear-gradient(90deg, #00ff88, #00cc66);
        }

        .progress-bar-fill.p2 {
            background: linear-gradient(90deg, #ff6b6b, #cc4444);
        }

        canvas {
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            background: #000;
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin-top: 15px;
        }

        .control-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 10px;
        }

        .control-box h4 {
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .control-box.p1 h4 {
            color: #00ff88;
        }

        .control-box.p2 h4 {
            color: #ff6b6b;
        }

        .control-box p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .start-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff6b6b, #cc5555);
            color: #fff;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 107, 107, 0.6);
        }

        .winner {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 15px;
            min-height: 40px;
        }

        .winner.p1 {
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.7);
        }

        .winner.p2 {
            color: #ff6b6b;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.7);
        }

        .goal-info {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🛸 太空战机 - 双人对战 🚀</h1>
        
        <div class="score-board">
            <div class="player-info p1">
                <h3>🎮 玩家1 (绿色)</h3>
                <div class="score" id="score1">0</div>
                <div class="progress-bar">
                    <div class="progress-bar-fill p1" id="progress1" style="width: 0%"></div>
                </div>
            </div>
            <div class="player-info p2">
                <h3>🎮 玩家2 (红色)</h3>
                <div class="score" id="score2">0</div>
                <div class="progress-bar">
                    <div class="progress-bar-fill p2" id="progress2" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <div class="control-box p1">
                <h4>玩家1控制</h4>
                <p>WASD 移动 | 空格 发射</p>
            </div>
            <div class="control-box p2">
                <h4>玩家2控制</h4>
                <p>方向键 移动 | Enter 发射</p>
            </div>
        </div>

        <div class="buttons">
            <button class="start-btn" onclick="startGame()">🚀 开始游戏</button>
            <button class="reset-btn" onclick="resetGame()">🔄 重新开始</button>
        </div>
        
        <p class="goal-info">🎯 目标分数: 1000分 | 先达到者获胜！</p>

        <div class="winner" id="winnerDisplay"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置全屏画布
        function resizeCanvas() {
            canvas.width = window.innerWidth - 40;
            canvas.height = window.innerHeight - 250;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const score1Element = document.getElementById('score1');
        const score2Element = document.getElementById('score2');
        const winnerDisplay = document.getElementById('winnerDisplay');
        const progress1Element = document.getElementById('progress1');
        const progress2Element = document.getElementById('progress2');

        // 游戏状态
        let gameRunning = false;
        let gameLoop = null;
        
        // 音频上下文
        let audioCtx = null;
        let masterGain = null;

        const WINNING_SCORE = 1000;
        const DAMAGE_SCORE = 100;
        
        // 星星背景
        function initStars() {
            stars.length = 0;
            const starCount = Math.floor((canvas.width * canvas.height) / 4000);
            for (let i = 0; i < Math.max(150, starCount); i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.3
                });
            }
        }
        initStars();

        // 玩家1
        const player1 = {
            x: 100,
            y: 0,
            width: 60,
            height: 35,
            speed: 8,
            color: '#00ff88',
            bullets: [],
            cooldown: 0,
            score: 0,
            thrusterOsc: null,
            thrusterGain: null,
            panner: null,
            isMoving: false
        };

        // 玩家2
        const player2 = {
            x: 0,
            y: 0,
            width: 60,
            height: 35,
            speed: 8,
            color: '#ff6b6b',
            bullets: [],
            cooldown: 0,
            score: 0,
            thrusterOsc: null,
            thrusterGain: null,
            panner: null,
            isMoving: false
        };

        // 按键状态
        const keys = {};

        // 粒子效果
        const particles = [];

        // 初始化音频系统
        function initAudio() {
            if (audioCtx) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);
        }

        // 创建3D飞行音效 (引擎轰鸣)
        function createThrusterSound(player) {
            if (!audioCtx || !masterGain) return;
            
            // 振荡器 - 低频引擎声
            player.thrusterOsc = audioCtx.createOscillator();
            player.thrusterOsc.type = 'sawtooth';
            player.thrusterOsc.frequency.value = 80 + Math.random() * 20;
            
            // 低通滤波器
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            
            // 增益控制
            player.thrusterGain = audioCtx.createGain();
            player.thrusterGain.gain.value = 0;
            
            // 3D 声像
            player.panner = audioCtx.createStereoPanner();
            
            // 连接音频链
            player.thrusterOsc.connect(filter);
            filter.connect(player.thrusterGain);
            player.thrusterGain.connect(player.panner);
            player.panner.connect(masterGain);
            
            player.thrusterOsc.start();
        }

        // 更新3D音效位置
        function update3DAudio(player, isPlayer1) {
            if (!player.thrusterOsc || !player.panner || !player.thrusterGain) return;
            
            // 计算立体声位置 (-1 左, 0 中, 1 右)
            const panPosition = isPlayer1 
                ? (player.x / canvas.width) * 2 - 1
                : (player.x / canvas.width) * 2 - 1;
            player.panner.pan.value = Math.max(-1, Math.min(1, panPosition));
            
            // 根据移动状态调整音量
            const targetGain = player.isMoving ? 0.15 : 0.05;
            player.thrusterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.1);
            
            // 根据高度调整频率
            const heightFactor = player.y / canvas.height;
            player.thrusterOsc.frequency.setTargetAtTime(
                70 + heightFactor * 30 + (Math.random() * 5), 
                audioCtx.currentTime, 
                0.05
            );
        }

        // 射击音效
        function playShootSound(isPlayer1) {
            if (!audioCtx || !masterGain) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner();
            
            osc.type = 'square';
            // 玩家1高音，玩家2低音
            osc.frequency.setValueAtTime(isPlayer1 ? 880 : 660, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.1);
            
            // 3D 位置
            const panPosition = isPlayer1 
                ? (player1.x / canvas.width) * 2 - 1
                : (player2.x / canvas.width) * 2 - 1;
            panner.pan.value = Math.max(-1, Math.min(1, panPosition));
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(panner);
            panner.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // 爆炸/击中音效
        function playExplosionSound(isPlayer1) {
            if (!audioCtx || !masterGain) return;
            
            // 白噪声
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            const panner = audioCtx.createStereoPanner();
            const panPosition = isPlayer1 
                ? (player1.x / canvas.width) * 2 - 1
                : (player2.x / canvas.width) * 2 - 1;
            panner.pan.value = Math.max(-1, Math.min(1, panPosition));
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(panner);
            panner.connect(masterGain);
            
            noise.start();
            
            // 低频冲击音
            const bassOsc = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            
            bassOsc.type = 'sine';
            bassOsc.frequency.setValueAtTime(150, audioCtx.currentTime);
            bassOsc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            
            bassGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            bassGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            bassOsc.connect(bassGain);
            bassGain.connect(masterGain);
            
            bassOsc.start();
            bassOsc.stop(audioCtx.currentTime + 0.2);
        }

        function createExplosion(x, y, color, isShipExplosion = false) {
            const count = isShipExplosion ? 100 : 30;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * (isShipExplosion ? 25 : 10),
                    vy: (Math.random() - 0.5) * (isShipExplosion ? 25 : 10),
                    life: 1,
                    color: color,
                    size: isShipExplosion ? Math.random() * 8 + 4 : Math.random() * 4 + 2,
                    decay: isShipExplosion ? 0.008 : 0.02
                });
            }
            
            // 添加闪光效果
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1,
                    color: '#ffffff',
                    size: Math.random() * 6 + 2,
                    decay: 0.03
                });
            }
        }

        function createShipDestructionEffect(player) {
            // 飞船主体爆炸
            createExplosion(
                player.x + player.width / 2, 
                player.y + player.height / 2, 
                player.color, 
                true
            );
            
            // 分散的碎片
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: player.x + Math.random() * player.width,
                    y: player.y + Math.random() * player.height,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    life: Math.random() * 0.5 + 0.5,
                    color: Math.random() > 0.5 ? player.color : '#ffffff',
                    size: Math.random() * 5 + 1,
                    decay: 0.01
                });
            }
        }

        function initGame() {
            if (!audioCtx) {
                initAudio();
            }
            
            // 停止之前的音效
            if (player1.thrusterOsc) {
                player1.thrusterOsc.stop();
                player1.thrusterOsc = null;
            }
            if (player2.thrusterOsc) {
                player2.thrusterOsc.stop();
                player2.thrusterOsc = null;
            }
            
            // 确保canvas尺寸正确
            resizeCanvas();
            initStars();
            
            player1.x = 100;
            player1.y = canvas.height / 2 - player1.height / 2;
            player1.bullets = [];
            player1.cooldown = 0;
            player1.score = 0;
            player1.isMoving = false;

            player2.x = canvas.width - 100 - player2.width;
            player2.y = canvas.height / 2 - player2.height / 2;
            player2.bullets = [];
            player2.cooldown = 0;
            player2.score = 0;
            player2.isMoving = false;

            score1Element.textContent = '0';
            score2Element.textContent = '0';
            progress1Element.style.width = '0%';
            progress2Element.style.width = '0%';
            winnerDisplay.textContent = '';
            winnerDisplay.className = 'winner';
            
            // 创建引擎音效
            createThrusterSound(player1);
            createThrusterSound(player2);
        }

        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function drawStars() {
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function updatePlayer(player, upKey, downKey, leftKey, rightKey) {
            // 移动
            player.isMoving = false;
            if (keys[upKey] && player.y > 0) {
                player.y -= player.speed;
                player.isMoving = true;
            }
            if (keys[downKey] && player.y < canvas.height - player.height) {
                player.y += player.speed;
                player.isMoving = true;
            }
            if (keys[leftKey] && player.x > 0) {
                player.x -= player.speed;
                player.isMoving = true;
            }
            if (keys[rightKey] && player.x < canvas.width - player.width) {
                player.x += player.speed;
                player.isMoving = true;
            }

            // 冷却
            if (player.cooldown > 0) {
                player.cooldown--;
            }
        }

        function fireBullet(player, direction, shootKey, isPlayer1) {
            if (keys[shootKey] && player.cooldown === 0) {
                player.bullets.push({
                    x: direction === 1 ? player.x + player.width : player.x,
                    y: player.y + player.height / 2,
                    vx: direction * 10,
                    width: 15,
                    height: 4
                });
                player.cooldown = 10;
                playShootSound(isPlayer1);
            }
        }

        function updateBullets(player, opponent, isPlayer1) {
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                const bullet = player.bullets[i];
                bullet.x += bullet.vx;

                // 检查是否击中对方
                if (bullet.x < opponent.x + opponent.width &&
                    bullet.x + bullet.width > opponent.x &&
                    bullet.y < opponent.y + opponent.height &&
                    bullet.y + bullet.height > opponent.y) {
                    
                    // 创建击中特效
                    createExplosion(bullet.x, bullet.y, player.color);
                    playExplosionSound(isPlayer1);
                    player.score += DAMAGE_SCORE;
                    
                    if (player === player1) {
                        score1Element.textContent = player.score;
                    } else {
                        score2Element.textContent = player.score;
                    }
                    
                    player.bullets.splice(i, 1);
                    
                    // 更新进度条
                    updateProgressBars();
                    
                    // 检查是否达到目标分数
                    if (player.score >= WINNING_SCORE) {
                        endGame(isPlayer1 ? 'p1' : 'p2');
                    }
                    continue;
                }

                // 检查是否出界
                if (bullet.x < 0 || bullet.x > canvas.width) {
                    player.bullets.splice(i, 1);
                }
            }
        }

        function updateProgressBars() {
            const progress1 = Math.min((player1.score / WINNING_SCORE) * 100, 100);
            const progress2 = Math.min((player2.score / WINNING_SCORE) * 100, 100);
            progress1Element.style.width = progress1 + '%';
            progress2Element.style.width = progress2 + '%';
        }

        function drawPlayer(player) {
            ctx.fillStyle = player.color;
            
            // 飞船主体
            ctx.beginPath();
            ctx.moveTo(player.x + player.width, player.y + player.height / 2);
            ctx.lineTo(player.x, player.y);
            ctx.lineTo(player.x + 10, player.y + player.height / 2);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // 飞船发光效果
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 驾驶舱
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x + player.width * 0.6, player.y + player.height / 2, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBullets(player) {
            player.bullets.forEach(bullet => {
                ctx.fillStyle = player.color;
                ctx.shadowColor = player.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x, bullet.y - bullet.height / 2, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay || 0.02;
                p.vx *= 0.98;
                p.vy *= 0.98;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function endGame(winner) {
            gameRunning = false;
            
            // 停止引擎音效
            if (player1.thrusterGain) {
                player1.thrusterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
            if (player2.thrusterGain) {
                player2.thrusterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
            
            // 失败方飞船爆炸
            if (winner === 'p1') {
                createShipDestructionEffect(player2);
                playExplosionSound(false);
            } else {
                createShipDestructionEffect(player1);
                playExplosionSound(true);
            }
            
            // 绘制最终爆炸效果
            setTimeout(() => {
                draw();
                drawGameOver(winner);
            }, 100);
        }

        function drawGameOver(winner) {
            // 半透明遮罩
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 游戏结束文字
            ctx.textAlign = 'center';
            
            // 标题
            ctx.font = 'bold 60px Arial';
            ctx.fillStyle = winner === 'p1' ? '#00ff88' : '#ff6b6b';
            ctx.fillText('🏆 游戏结束 🏆', canvas.width / 2, canvas.height / 2 - 80);
            
            // 获胜者
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = winner === 'p1' ? '#00ff88' : '#ff6b6b';
            const winnerText = winner === 'p1' ? '🎉 玩家1 获胜！' : '🎉 玩家2 获胜！';
            ctx.fillText(winnerText, canvas.width / 2, canvas.height / 2);
            
            // 最终比分
            ctx.font = '28px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`最终比分 - 玩家1: ${player1.score}  vs  玩家2: ${player2.score}`, 
                         canvas.width / 2, canvas.height / 2 + 50);
            
            // 提示
            ctx.font = '20px Arial';
            ctx.fillStyle = '#aaaaaa';
            ctx.fillText('点击"重新开始"开始新游戏', canvas.width / 2, canvas.height / 2 + 100);
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function update() {
            // 即使游戏结束也要继续更新粒子效果
            if (!gameRunning) {
                updateStars();
                updateParticles();
                draw();
                return;
            }

            // 更新星星
            updateStars();

            // 更新玩家1
            updatePlayer(player1, 'KeyW', 'KeyS', 'KeyA', 'KeyD');
            fireBullet(player1, 1, 'Space', true);
            updateBullets(player1, player2, true);
            update3DAudio(player1, true);

            // 更新玩家2
            updatePlayer(player2, 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');
            fireBullet(player2, -1, 'Enter', false);
            updateBullets(player2, player1, false);
            update3DAudio(player2, false);

            // 更新粒子
            updateParticles();

            // 绘制
            draw();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星
            drawStars();

            // 绘制粒子
            drawParticles();

            // 绘制子弹
            drawBullets(player1);
            drawBullets(player2);

            // 绘制玩家
            drawPlayer(player1);
            drawPlayer(player2);
        }

        function startGame() {
            if (!audioCtx) {
                initAudio();
                createThrusterSound(player1);
                createThrusterSound(player2);
            }
            if (gameRunning) return;
            gameRunning = true;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 1000 / 60);
        }

        function resetGame() {
            gameRunning = false;
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            initGame();
            draw();
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 初始化
        initGame();
        draw();
    </script>
</body>
</html>
