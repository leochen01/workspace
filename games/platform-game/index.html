        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);
        }

        function playSound(freq, duration, type = 'sine') {
            if (!audioCtx || !masterGain) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCollectSound(isStar = false) {
            if (isStar) {
                playSound(880, 0.15);
                setTimeout(() => playSound(1100, 0.15), 50);
            } else {

            }
        }

            const notes = isPlayer1 
                ? [523, 659, 784, 1047, 784, 1047, 1318, 1568]
                : [392, 494, 587, 784, 587, 784, 988, 1175];
            notes.forEach((freq, i) => {
                setTimeout(() => playSound(freq, 0.2), i * 80);
            });
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

            // 更新关卡显示
            const levelNames = ['🌲', '🏜️', '❄️', '🌋'];
            const levelFullNames = ['森林关', '沙漠关', '冰原关', '熔岩关'];
            document.getElementById('level-num').textContent = levelNames[currentLevel];
            document.getElementById('level-name').textContent = levelFullNames[currentLevel];
        }

        function updateUI() {
            document.getElementById('p1-coins').textContent = player1.coins;
            document.getElementById('p1-stars').textContent = player1.stars;
            document.getElementById('p1-deaths').textContent = player1.deaths;
            document.getElementById('p2-coins').textContent = player2.coins;
            document.getElementById('p2-stars').textContent = player2.stars;
            document.getElementById('p2-deaths').textContent = player2.deaths;
        }

        function updatePlayer(player, leftKey, rightKey, jumpKey) {
            if (keys[leftKey]) {
                player.vx = -player.speed;
                player.facing = -1;
            } else if (keys[rightKey]) {
                player.vx = player.speed;
                player.facing = 1;
            } else {
                player.vx *= 0.8;
            }

            if (keys[jumpKey] && player.onGround) {
                player.vy = -14;
                player.onGround = false;
                playJumpSound();
            }

            player.vy += LEVELS[currentLevel].gravity;
            player.x += player.vx;
            player.y += player.vy;

            player.onGround = false;
            platforms.forEach(plat => {
                if (player.x < plat.x + plat.w && player.x + player.w > plat.x &&
                    player.y < plat.y + plat.h && player.y + player.h > plat.y) {
                    
                    if (player.vy > 0 && player.y + player.h - player.vy <= plat.y) {
                        player.y = plat.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                    } else if (player.vy < 0 && player.y - player.vy >= plat.y + plat.h) {
                        player.y = plat.y + plat.h;
                        player.vy = 0;
                    } else {
                        if (player.vx > 0) player.x = plat.x - player.w;
                        else if (player.vx < 0) player.x = plat.x + plat.w;
                        player.vx = 0;
                    }
                }
            });

            if (player.x < 0) player.x = 0;
            if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
            if (player.y > canvas.height) {
                player.deaths++;
                player.x = 50;
                player.y = 400;
                player.vx = 0;
                player.vy = 0;
                if (!player.hasShield) {
                    player.coins = Math.floor(player.coins * 0.9);
                    player.stars = Math.floor(player.stars * 0.9);
                }
                playSound(200, 0.3, 'sawtooth');
            }

            collectibles.forEach(c => {
                if (c.collected) return;
                const dist = Math.hypot((player.x + player.w/2) - c.x, (player.y + player.h/2) - c.y);
                if (dist < c.size + 15) {
                    c.collected = true;
                    if (c.type === 'coin') {
                        player.coins += 10;
                        playCollectSound(false);
                    } else {
                        player.stars += 50;
                        playCollectSound(true);
                    }
                    createParticles(c.x, c.y, c.type === 'star' ? '#ffd700' : '#ffd700', 15);
                }
            });

            powerups.forEach(p => {
                if (p.collected) return;
                const dist = Math.hypot((player.x + player.w/2) - p.x, (player.y + player.h/2) - p.y);
                if (dist < 25) {
                    p.collected = true;
                    if (p.type === 'speed') {
                        player.speed = player.maxSpeed * 1.3;
                        setTimeout(() => player.speed = player.maxSpeed, 5000);
                    } else if (p.type === 'shield') {
                        player.hasShield = true;
                    }
                    createParticles(p.x, p.y, '#44aaff', 15);
                }
            });

            portals.forEach(p => {
                const dist = Math.hypot((player.x + player.w/2) - p.x, (player.y + player.h/2) - p.y);
                if (dist < 25) {
                    player.x = p.targetX;
                    player.y = p.targetY;
                    player.vx = 0;
                    player.vy = 0;
                    createParticles(p.x, p.y, '#8844ff', 20);
                }
            });

            hazards.forEach(h => {
                if (player.x < h.x + h.w && player.x + player.w > h.x &&
                    player.y < h.y + h.h && player.y + player.h > h.y) {
                    if (player.hasShield) {
                        player.hasShield = false;
                        player.vy = -8;
                        createParticles(player.x + player.w/2, player.y + player.h/2, '#44aaff', 20);
                    } else {
                        player.deaths++;
                        player.x = 50;
                        player.y = 400;
                        player.vx = 0;
                        player.vy = 0;
                        playSound(150, 0.3, 'sawtooth');
                    }
                }
            });

            const distToFinish = Math.hypot((player.x + player.w/2) - finish.x, (player.y + player.h/2) - finish.y);
            if (distToFinish < 30 && MODES[currentMode].winCondition === 'finish') {
                endGame(player === player1 ? 'p1' : 'p2');
            }
        }

        function drawBackground() {
            const level = LEVELS[currentLevel];
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, level.bgTop);
            gradient.addColorStop(1, level.bgBottom);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawPlatforms() {
            platforms.forEach(p => {
                const gradient = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
                gradient.addColorStop(0, '#4a4a6a');
                gradient.addColorStop(1, '#3a3a5a');
                ctx.fillStyle = gradient;
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = '#5a5a7a';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });
        }

        function drawHazards() {
            hazards.forEach(h => {
                ctx.fillStyle = h.type === 'lava' ? '#ff4400' : '#888';
                const spikeSize = h.w / 3;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(h.x + i * spikeSize, h.y + h.h);
                    ctx.lineTo(h.x + i * spikeSize + spikeSize/2, h.y);
                    ctx.lineTo(h.x + (i+1) * spikeSize, h.y + h.h);
                    ctx.fill();
                }
            });
        }

        function drawCollectibles() {
            const time = Date.now() / 200;
            collectibles.forEach(c => {
                if (c.collected) return;
                const hover = Math.sin(time) * 3;
                ctx.font = `${c.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(c.type === 'coin' ? '🪙' : '⭐', c.x, c.y + hover);
            });
        }

        function drawPowerups() {
            const time = Date.now() / 150;
            powerups.forEach(p => {
                if (p.collected) return;
                const pulse = 1 + Math.sin(time * 2) * 0.1;
                ctx.font = `${20 * pulse}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.type === 'speed' ? '🚀' : '🛡️', p.x, p.y);
            });
        }

        function drawPortals() {
            const time = Date.now() / 100;
            portals.forEach(p => {
                const pulse = 1 + Math.sin(time * 3) * 0.2;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.scale(pulse, pulse);
                ctx.font = '25px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = 0.7;
                ctx.fillText('🌀', 0, 0);
                ctx.globalAlpha = 1;
                ctx.restore();
            });
        }

        function drawFinish() {
            const time = Date.now() / 100;
            const glow = 1 + Math.sin(time * 2) * 0.2;
            
            ctx.save();
            ctx.translate(finish.x, finish.y);
            ctx.globalAlpha = glow;
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏁', 0, 0);
            
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, 25 + Math.sin(time * 3) * 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawPlayer(player, isPlayer1) {
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            if (player.facing === -1) ctx.scale(-1, 1);
            
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(0, -5, 12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(-4, -8, 3, 0, Math.PI * 2);
            ctx.arc(4, -8, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = player.color;
            ctx.fillRect(-10, 2, 20, 15);
            
            ctx.fillStyle = '#333';
            ctx.fillRect(-6, 8, 5, 10);
            ctx.fillRect(2, 8, 5, 10);
            
            if (player.hasShield) {
                ctx.strokeStyle = '#44aaff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function draw() {
            drawBackground();
            drawPlatforms();
            drawHazards();
            drawCollectibles();
            drawPowerups();
            drawPortals();
            drawFinish();
            drawParticles();
            drawPlayer(player1, true);
            drawPlayer(player2, false);
            
            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('点击"开始闯关"开始游戏！', canvas.width/2, canvas.height/2);
                ctx.font = '20px Arial';
                ctx.fillStyle = '#ffd700';
                ctx.fillText(MODES[currentMode].name, canvas.width/2, canvas.height/2 + 40);
            }
        }

        function update() {
            if (!gameRunning) return;
            
            updatePlayer(player1, 'KeyA', 'KeyD', 'KeyW');
            updatePlayer(player2, 'ArrowLeft', 'ArrowRight', 'ArrowUp');
            updateParticles();
            
            const mode = MODES[currentMode];
            
            if (mode.winCondition === 'coins' || mode.winCondition === 'stars') {
                gameTime--;
                const timeEl = document.getElementById('game-time');
                timeEl.textContent = gameTime + 's';
                timeEl.classList.toggle('warning', gameTime <= 10);
                
                if (gameTime <= 0) {
                    endGameByScore();
                }
            }
            
            draw();
        }

        function endGameByScore() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            
            const mode = MODES[currentMode];
            const p1Score = mode.winCondition === 'coins' 
                ? player1.coins + player1.stars * 5 
                : player1.stars;
            const p2Score = mode.winCondition === 'coins' 
                ? player2.coins + player2.stars * 5 
                : player2.stars;
            
            const display = document.getElementById('winnerDisplay');
            
            if (p1Score > p2Score) {
                playWinSound(true);
                display.textContent = `🎉 玩家1 获胜！${p1Score} vs ${p2Score}`;
                display.className = 'winner-display p1-wins';
            } else if (p2Score > p1Score) {
                playWinSound(false);
                display.textContent = `🎉 玩家2 获胜！${p2Score} vs ${p1Score}`;
                display.className = 'winner-display p2-wins';
            } else {
                display.textContent = `🤝 平局！${p1Score} vs ${p2Score}`;
                display.className = 'winner-display tie';
            }
        }

        function endGame(winner) {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            
            const display = document.getElementById('winnerDisplay');
            
            if (winner === 'p1') {
                playWinSound(true);
                display.textContent = '🎉 玩家1 获胜！率先到达终点！';
                display.className = 'winner-display p1-wins';
            } else {
                playWinSound(false);
                display.textContent = '🎉 玩家2 获胜！率先到达终点！';
                display.className = 'winner-display p2-wins';
            }
        }

        function nextMode() {
            currentMode = (currentMode + 1) % MODES.length;
            document.querySelector('.mode-btn').previousElementSibling.previousElementSibling.textContent = MODES[currentMode].name;
            resetGame();
        }

        function nextLevel() {
            currentLevel = (currentLevel + 1) % LEVELS.length;
            resetGame();
        }

        function selectLevel(levelIndex) {
            currentLevel = levelIndex;
            resetGame();
        }

        function startGame() {
            if (!audioCtx) initAudio();
            if (gameRunning) return;
            
            gameRunning = true;
            gameTime = MODES[currentMode].timeLimit || 0;
            
            document.getElementById('game-time').textContent = 
                MODES[currentMode].timeLimit ? gameTime + 's' : '∞';
            document.getElementById('game-time').classList.remove('warning');
            document.getElementById('winnerDisplay').textContent = '';
            document.getElementById('winnerDisplay').className = 'winner-display';
            
            loadLevel();
            
            gameInterval = setInterval(update, 1000 / 60);
            
            if (MODES[currentMode].timeLimit) {
                timeInterval = setInterval(() => {
                    gameTime--;
                    const timeEl = document.getElementById('game-time');
                    timeEl.textContent = gameTime + 's';
                    timeEl.classList.toggle('warning', gameTime <= 10);
                    if (gameTime <= 0) {
                        endGameByScore();
                    }
                }, 1000);
            }
        }

        function resetGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            
            player1.coins = 0; player1.stars = 0; player1.deaths = 0;
            player2.coins = 0; player2.stars = 0; player2.deaths = 0;
            particles = [];
            
            document.getElementById('game-time').textContent = 
                MODES[currentMode].timeLimit ? MODES[currentMode].timeLimit + 's' : '∞';
            document.getElementById('game-time').classList.remove('warning');
            document.getElementById('winnerDisplay').textContent = '';
            document.getElementById('winnerDisplay').className = 'winner-display';
            
            updateUI();
            loadLevel();
            draw();
        }

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['KeyW', 'KeyA', 'KeyD', 'Space', 'ArrowUp', 'ArrowLeft', 'ArrowRight', 'ArrowDown', 'Enter'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        loadLevel();
        draw();
    </script>
</body>
</html>
            });
