<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 3D鬼屋探险 - 你敢来吗？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        #gameCanvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            text-shadow: 0 0 10px #ff0000;
        }

        #health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #8b0000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff0000);
            transition: width 0.3s;
        }

        #sanity-bar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #4b0082;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #sanity-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4b0082, #9932cc);
            transition: width 0.3s;
        }

        #items {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .item {
            width: 40px;
            height: 40px;
            background: rgba(139,0,0,0.5);
            border: 2px solid #8b0000;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0.3;
        }

        #compass {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px #ff0000;
        }

        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 24px;
            text-shadow: 0 0 20px #ff0000;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            text-align: center;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #aaa;
            font-size: 12px;
            text-align: right;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0000 0%, #000000 50%, #0a0000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        #start-screen h1 {
            font-size: 60px;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000, 0 0 60px #8b0000;
            margin-bottom: 20px;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 0.4; }
            54% { opacity: 0.9; }
        }

        #start-screen p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
        }

        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, #8b0000, #4a0000);
            color: #fff;
            border: 3px solid #ff0000;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: 0 0 10px #ff0000;
            transition: all 0.3s;
        }

        #start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff0000;
        }

        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        #game-over h1 {
            font-size: 80px;
            color: #ff0000;
            text-shadow: 0 0 50px #ff0000;
            margin-bottom: 20px;
        }

        #game-over p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        #restart-btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #8b0000, #4a0000);
            color: #fff;
            border: 2px solid #ff0000;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff0000;
        }

        #minimap {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #8b0000;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>👻 3D鬼屋探险</h1>
        <p>在古老的宅邸中探索，找到5个灵魂碎片逃出生天！</p>
        <button id="start-btn">🔮 进入鬼屋</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">💀 游戏结束</h1>
        <p id="go-message"></p>
        <button id="restart-btn">🔄 再试一次</button>
    </div>

    <div id="ui">
        <div id="health-bar"><div id="health-fill"></div></div>
        <div>❤️ 生命值</div>
        <div id="sanity-bar"><div id="sanity-fill"></div></div>
        <div>🧠 理智值</div>
        <div id="items">
            <div class="item" id="item-key">🔑</div>
        </div>
        <div style="margin-top: 10px;">🧩 灵魂碎片: <span id="souls">0</span>/5</div>
    </div>

    <canvas id="minimap"></canvas>

    <div id="compass">🧭 北: <span id="direction">前</span></div>

    <div id="message"></div>

    <div id="controls">
        <strong>🎮 操作指南</strong><br>
        W/A/S/D 或 ↑←↓→ 移动<br>
        鼠标 环顾四周<br>
        收集 🧩 灵魂碎片<br>
        躲避 👻 幽灵<br>
        寻找 🗝️ 钥匙开门
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let gameStarted = false;
        let health = 100;
        let sanity = 100;
        let souls = 0;
        let hasKey = false;
        let gameOver = false;

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x2a2a3a, 2, 40);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 8);  // 玩家视线高度 1.7米
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        let audioCtx;
        let masterGain;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.4;
            masterGain.connect(audioCtx.destination);
            
            // Resume audio context if suspended
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(freq, duration, type = 'sine') {
            if (!audioCtx || !masterGain) {
                // Try to init audio first
                initAudio();
                if (!audioCtx || !masterGain) return;
            }
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        function playFootstep() {
            playSound(80 + Math.random() * 40, 0.03, 'square');
        }

        function playGhostSound() {
            playSound(300 + Math.random() * 150, 0.4, 'sine');
            setTimeout(() => playSound(200 + Math.random() * 100, 0.4, 'sine'), 150);
        }

        function playCollectSound() {
            playSound(660, 0.1);
            setTimeout(() => playSound(880, 0.15), 50);
            setTimeout(() => playSound(1100, 0.2), 100);
        }

        function playScarySound() {
            playSound(60, 0.2, 'sawtooth');
            setTimeout(() => playSound(40, 0.3, 'sawtooth'), 100);
        }

        function playWinSound() {
            const notes = [523, 659, 784, 1047, 1318, 1568, 2093];
            notes.forEach((freq, i) => {
                setTimeout(() => playSound(freq, 0.3), i * 120);
            });
        }

        function playAmbientSound() {
            // Creepy ambient background
            playSound(40, 1, 'sine');
        }

        const ambientLight = new THREE.AmbientLight(0x666688, 0.5);
        scene.add(ambientLight);

        // 手电筒 - 更亮
        const torchLight = new THREE.SpotLight(0xffffee, 3, 25, Math.PI / 3, 0.8);
        torchLight.position.set(0, 0, 0);
        torchLight.target.position.set(0, 0, -1);
        scene.add(torchLight);
        scene.add(torchLight.target);

        const ghosts = [];
        const collectibles = [];
        const doors = [];
        const candles = [];

        const walls = [
            { x: 0, z: -27.5, w: 60, h: 4, d: 1 },
            { x: 0, z: 27.5, w: 60, h: 4, d: 1 },
            { x: -27.5, z: 0, w: 1, h: 4, d: 55 },
            { x: 27.5, z: 0, w: 1, h: 4, d: 55 },
            { x: 7, z: -6, w: 1, h: 4, d: 13 },
            { x: -7, z: 6, w: 1, h: 4, d: 13 },
            { x: 6, z: 7, w: 13, h: 4, d: 1 },
            { x: -6, z: -7, w: 13, h: 4, d: 1 },
            { x: 17, z: -6, w: 1, h: 4, d: 9 },
            { x: 17, z: 7, w: 1, h: 4, d: 9 },
            { x: -17, z: -6, w: 1, h: 4, d: 9 },
            { x: -17, z: 7, w: 1, h: 4, d: 9 },
            { x: -6, z: -17, w: 9, h: 4, d: 1 },
            { x: 6, z: -17, w: 9, h: 4, d: 1 },
            { x: -6, z: 17, w: 9, h: 4, d: 1 },
            { x: 6, z: 17, w: 9, h: 4, d: 1 },
        ];

        const wallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x5a5a6a,
            roughness: 0.7,
            metalness: 0.1
        });
        
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x4a4a5a,
            roughness: 0.7
        });
        
        const ceilingMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3a3a4a,
            roughness: 0.8
        });

        const floorGeom = new THREE.PlaneGeometry(60, 60);
        const floor = new THREE.Mesh(floorGeom, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const ceiling = new THREE.Mesh(floorGeom, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 4;
        scene.add(ceiling);

        function createWall(x, z, w, h, d) {
            const geom = new THREE.BoxGeometry(w, h, d);
            const wall = new THREE.Mesh(geom, wallMaterial);
            wall.position.set(x, h/2, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            
            const edgeGeom = new THREE.EdgesGeometry(geom);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000 });
            const edges = new THREE.LineSegments(edgeGeom, edgeMat);
            wall.add(edges);
        }

        function createDoor(x, z, rotationY) {
            const doorGroup = new THREE.Group();
            
            const doorGeom = new THREE.BoxGeometry(2, 3, 0.2);
            const doorMat = new THREE.MeshStandardMaterial({ 
                color: 0x4a2c0a,
                roughness: 0.7
            });
            const door = new THREE.Mesh(doorGeom, doorMat);
            door.position.set(1, 1.5, 0);
            door.castShadow = true;
            doorGroup.add(door);
            
            const knobGeom = new THREE.SphereGeometry(0.1);
            const knobMat = new THREE.MeshStandardMaterial({ color: 0x8b0000 });
            const knob = new THREE.Mesh(knobGeom, knobMat);
            knob.position.set(1.8, 1.5, 0.2);
            doorGroup.add(knob);
            
            doorGroup.position.set(x, 0, z);
            doorGroup.rotation.y = rotationY;
            scene.add(doorGroup);
            
            doors.push({
                group: doorGroup,
                door: door,
                open: false,
                locked: true,
                x, z
            });
        }

        function createWindow(x, z, rotationY) {
            const windowGroup = new THREE.Group();
            
            const frameGeom = new THREE.BoxGeometry(2, 2, 0.3);
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
            const frame = new THREE.Mesh(frameGeom, frameMat);
            windowGroup.add(frame);
            
            const glassGeom = new THREE.BoxGeometry(1.6, 1.6, 0.1);
            const glassMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a3a5a,
                transparent: true,
                opacity: 0.5,
                emissive: 0x0a1a2a
            });
            const glass = new THREE.Mesh(glassGeom, glassMat);
            windowGroup.add(glass);
            
            windowGroup.position.set(x, 2, z);
            windowGroup.rotation.y = rotationY;
            scene.add(windowGroup);
        }

        function createGhost(x, y, z) {
            const ghostGroup = new THREE.Group();
            
            // 身体 - 更亮更明显
            const bodyGeom = new THREE.ConeGeometry(0.6, 1.8, 8);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0xaaddff,
                transparent: true,
                opacity: 0.7,
                emissive: 0x446688,
                emissiveIntensity: 0.6
            });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.9;
            ghostGroup.add(body);
            
            // 眼睛 - 更亮
            const eyeGeom = new THREE.SphereGeometry(0.12);
            const eyeMat = new THREE.MeshStandardMaterial({ 
                color: 0xff0000,
                emissive: 0xff0000,
                emissiveIntensity: 1.5
            });
            const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
            leftEye.position.set(-0.2, 1.1, 0.45);
            ghostGroup.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
            rightEye.position.set(0.2, 1.1, 0.45);
            ghostGroup.add(rightEye);
            
            // 光环 - 更亮
            const light = new THREE.PointLight(0x88ccff, 1.5, 8);
            light.position.y = 1.2;
            ghostGroup.add(light);
            
            ghostGroup.position.set(x, y, z);
            scene.add(ghostGroup);
            
            ghosts.push({
                group: ghostGroup,
                baseY: y,
                baseX: x,
                baseZ: z,
                phase: Math.random() * Math.PI * 2,
                speed: 0.3 + Math.random() * 0.3,
                radius: 3 + Math.random() * 3
            });
        }

        function createSoul(x, y, z) {
            const soulGroup = new THREE.Group();
            
            const geom = new THREE.OctahedronGeometry(0.3);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x9932cc,
                emissive: 0x4b0082,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.9
            });
            const soul = new THREE.Mesh(geom, mat);
            soulGroup.add(soul);
            
            const light = new THREE.PointLight(0x9932cc, 0.5, 3);
            light.position.y = 0;
            soulGroup.add(light);
            
            soulGroup.position.set(x, y, z);
            scene.add(soulGroup);
            
            collectibles.push({
                type: 'soul',
                group: soulGroup,
                mesh: soul,
                x, y, z,
                collected: false,
                rotation: 0
            });
        }

        function createKey(x, y, z) {
            const keyGroup = new THREE.Group();
            
            const handleGeom = new THREE.TorusGeometry(0.1, 0.03, 8, 16);
            const handleMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700,
                emissive: 0x8b7500,
                emissiveIntensity: 0.3
            });
            const handle = new THREE.Mesh(handleGeom, handleMat);
            handle.rotation.x = Math.PI / 2;
            keyGroup.add(handle);
            
            const shaftGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.3);
            const shaft = new THREE.Mesh(shaftGeom, handleMat);
            shaft.rotation.x = Math.PI / 2;
            shaft.position.z = 0.2;
            keyGroup.add(shaft);
            
            const teethGeom = new THREE.BoxGeometry(0.08, 0.04, 0.04);
            const teeth = new THREE.Mesh(teethGeom, handleMat);
            teeth.position.set(0.05, 0, 0.35);
            keyGroup.add(teeth);
            
            const light = new THREE.PointLight(0xffd700, 0.3, 2);
            light.position.y = 0;
            keyGroup.add(light);
            
            keyGroup.position.set(x, y, z);
            scene.add(keyGroup);
            
            collectibles.push({
                type: 'key',
                group: keyGroup,
                x, y, z,
                collected: false
            });
        }

        function createCandle(x, y, z) {
            const candleGroup = new THREE.Group();
            
            const candleGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.4);
            const candleMat = new THREE.MeshStandardMaterial({ color: 0xfff8dc });
            const candle = new THREE.Mesh(candleGeom, candleMat);
            candle.position.y = 0.2;
            candleGroup.add(candle);
            
            const wickGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.08);
            const wickMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const wick = new THREE.Mesh(wickGeom, wickMat);
            wick.position.y = 0.42;
            candleGroup.add(wick);
            
            const flameGeom = new THREE.ConeGeometry(0.06, 0.15, 8);
            const flameMat = new THREE.MeshStandardMaterial({
                color: 0xffaa00,
                emissive: 0xff6600,
                emissiveIntensity: 1
            });
            const flame = new THREE.Mesh(flameGeom, flameMat);
            flame.position.y = 0.55;
            candleGroup.add(flame);
            
            // 更亮的烛光
            const light = new THREE.PointLight(0xff8844, 0.8, 8);
            light.position.y = 0.4;
            candleGroup.add(light);
            
            // 烛台底座
            const baseGeom = new THREE.CylinderGeometry(0.12, 0.15, 0.1);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const base = new THREE.Mesh(baseGeom, baseMat);
            base.position.y = 0.05;
            candleGroup.add(base);
            
            candleGroup.position.set(x, y, z);
            scene.add(candleGroup);
            
            candles.push({
                group: candleGroup,
                flame: flame,
                light: light,
                baseIntensity: 0.8
            });
        }

        function initScene() {
            walls.forEach(w => createWall(w.x, w.z, w.w, w.h, w.d));
            
            createDoor(-12, 0, Math.PI / 2);
            createDoor(12, 0, Math.PI / 2);
            createDoor(0, -12, 0);
            createDoor(0, 12, 0);
            
            createWindow(0, -27.4, 0);
            createWindow(27.4, 0, Math.PI / 2);
            createWindow(-27.4, 0, Math.PI / 2);
            
            createGhost(22, 1.5, 2);
            createGhost(-22, 1.5, 2);
            createGhost(2, 1.5, -22);
            createGhost(-2, 1.5, 22);
            createGhost(22, 1.5, 22);
            
            createSoul(22, 1.5, -2);
            createSoul(-22, 1.5, 2);
            createSoul(2, 1.5, 22);
            createSoul(-2, 1.5, -22);
            createSoul(22, 1.5, 22);
            
            createKey(-15, 0.3, 15);
            
            // 更多蜡烛，照亮房间
            createCandle(-5, 0, -5);
            createCandle(5, 0, 5);
            createCandle(-5, 0, 5);
            createCandle(5, 0, -5);
            createCandle(0, 0, -10);
            createCandle(-12, 0, 12);
            createCandle(12, 0, -12);
            createCandle(-20, 0, 20);
            createCandle(20, 0, -20);
        }

        const controls = new PointerLockControls(camera, document.body);
        
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
        });
        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            initAudio();
            controls.lock();
            gameStarted = true;
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            location.reload();
        });

        function showMessage(text, duration = 3000) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.opacity = 1;
            setTimeout(() => {
                msg.style.opacity = 0;
            }, duration);
        }

        function updateUI() {
            document.getElementById('health-fill').style.width = health + '%';
            document.getElementById('sanity-fill').style.width = sanity + '%';
            document.getElementById('souls').textContent = souls;
            document.getElementById('item-key').style.opacity = hasKey ? 1 : 0.3;
            
            const angle = Math.atan2(
                camera.getWorldDirection(new THREE.Vector3()).x,
                camera.getWorldDirection(new THREE.Vector3()).z
            );
            const dirs = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            document.getElementById('direction').textContent = dirs[Math.round((angle + Math.PI) / (Math.PI / 4)) % 8];
        }

        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');

        function drawMinimap() {
            minimapCtx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            minimapCtx.fillRect(0, 0, 150, 150);
            
            const scale = 2;
            const offsetX = 75;
            const offsetZ = 75;
            
            minimapCtx.fillStyle = '#333';
            walls.forEach(w => {
                minimapCtx.fillRect(
                    w.x * scale + offsetX - w.w * scale / 2,
                    w.z * scale + offsetZ - w.d * scale / 2,
                    w.w * scale,
                    w.d * scale
                );
            });
            
            collectibles.forEach(c => {
                if (c.type === 'soul' && !c.collected) {
                    minimapCtx.fillStyle = '#9932cc';
                    minimapCtx.beginPath();
                    minimapCtx.arc(c.x * scale + offsetX, c.z * scale + offsetZ, 3, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            });
            
            minimapCtx.fillStyle = '#00ff00';
            minimapCtx.beginPath();
            minimapCtx.arc(camera.position.x * scale + offsetX, camera.position.z * scale + offsetZ, 4, 0, Math.PI * 2);
            minimapCtx.fill();
            
            const dir = camera.getWorldDirection(new THREE.Vector3());
            minimapCtx.strokeStyle = '#00ff00';
            minimapCtx.lineWidth = 2;
            minimapCtx.beginPath();
            minimapCtx.moveTo(camera.position.x * scale + offsetX, camera.position.z * scale + offsetZ);
            minimapCtx.lineTo(
                (camera.position.x + dir.x * 0.5) * scale + offsetX,
                (camera.position.z + dir.z * 0.5) * scale + offsetZ
            );
            minimapCtx.stroke();
        }

        function checkCollision(x, z) {
            const margin = 0.3;
            for (const wall of walls) {
                const halfW = wall.w / 2 + margin;
                const halfD = wall.d / 2 + margin;
                if (x > wall.x - halfW && x < wall.x + halfW &&
                    z > wall.z - halfD && z < wall.z + halfD) {
                    return true;
                }
            }
            
            for (const door of doors) {
                if (!door.open) {
                    const halfW = 1 + margin;
                    const halfD = 0.2 + margin;
                    if (x > door.x - halfW && x < door.x + halfW &&
                        z > door.z - halfD && z < door.z + halfD) {
                        if (door.locked) {
                            if (hasKey) {
                                door.locked = false;
                                showMessage('🔓 用钥匙打开了门！');
                                playCollectSound();
                            } else {
                                showMessage('🚪 门锁住了，需要找到钥匙！');
                            }
                        }
                        return true;
                    }
                }
            }
            
            return false;
        }

        function checkCollectibles() {
            const playerPos = camera.position;
            
            for (const item of collectibles) {
                if (item.collected) continue;
                
                const dist = Math.hypot(
                    playerPos.x - item.x,
                    playerPos.z - item.z
                );
                
                if (dist < 1) {
                    item.collected = true;
                    scene.remove(item.group);
                    
                    if (item.type === 'soul') {
                        souls++;
                        playCollectSound();
                        showMessage(`🧩 找到灵魂碎片！(${souls}/5)`);
                        
                        if (souls >= 5) {
                            endGame(true);
                        }
                    } else if (item.type === 'key') {
                        hasKey = true;
                        playCollectSound();
                        showMessage('🔑 找到钥匙！可以打开锁着的门了！');
                    }
                }
            }
        }

        function endGame(won) {
            gameOver = true;
            controls.unlock();
            
            const go = document.getElementById('game-over');
            const title = document.getElementById('go-title');
            const msg = document.getElementById('go-message');
            
            go.style.display = 'flex';
            
            if (won) {
                title.textContent = '🎉 逃脱成功！';
                title.style.color = '#00ff00';
                msg.textContent = `恭喜！你收集了${souls}个灵魂碎片，成功逃出了鬼屋！`;
            } else {
                title.textContent = '💀 死亡';
                title.style.color = '#ff0000';
                if (health <= 0) {
                    msg.textContent = '你的生命值耗尽了...';
                } else {
                    msg.textContent = '你的理智崩溃了...';
                }
            }
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            if (gameStarted && !gameOver && controls.isLocked) {
                // 玩家移动
                const speed = 4;
                const velocity = new THREE.Vector3();
                
                let isMoving = false;
                if (keys['KeyW'] || keys['ArrowUp']) { velocity.z -= 1; isMoving = true; }
                if (keys['KeyS'] || keys['ArrowDown']) { velocity.z += 1; isMoving = true; }
                if (keys['KeyA'] || keys['ArrowLeft']) { velocity.x -= 1; isMoving = true; }
                if (keys['KeyD'] || keys['ArrowRight']) { velocity.x += 1; isMoving = true; }
                
                // 脚步声
                if (isMoving && Math.random() < 0.1) {
                    playFootstep();
                }
                
                velocity.normalize();
                velocity.multiplyScalar(speed * delta);
                
                const newX = camera.position.x + velocity.x;
                const newZ = camera.position.z + velocity.z;
                
                if (!checkCollision(newX, camera.position.z)) {
                    camera.position.x = newX;
                }
                if (!checkCollision(camera.position.x, newZ)) {
                    camera.position.z = newZ;
                }
                
                // 更新手电筒位置
                torchLight.position.copy(camera.position);
                torchLight.target.position.set(
                    camera.position.x + camera.getWorldDirection(new THREE.Vector3()).x * 5,
                    camera.position.y,
                    camera.position.z + camera.getWorldDirection(new THREE.Vector3()).z * 5
                );
                
                // 更新幽灵动画 - 更明显的游荡
                ghosts.forEach((ghost, i) => {
                    ghost.group.position.x = ghost.baseX + Math.sin(time * ghost.speed + ghost.phase) * ghost.radius;
                    ghost.group.position.z = ghost.baseZ + Math.cos(time * ghost.speed + ghost.phase) * ghost.radius;
                    ghost.group.position.y = ghost.baseY + Math.sin(time * 2 + ghost.phase) * 0.3;
                    ghost.group.rotation.y = time * 0.3 + ghost.phase;
                    
                    // 检测碰撞
                    const dist = Math.hypot(
                        camera.position.x - ghost.group.position.x,
                        camera.position.z - ghost.group.position.z
                    );
                    
                    if (dist < 2) {
                        health -= 15 * delta;
                        sanity -= 20 * delta;
                        playScarySound();
                        
                        if (health <= 0 || sanity <= 0) {
                            endGame(false);
                        }
                    }
                    
                    // 幽灵随机叫声
                    if (Math.random() < 0.015) {
                        playGhostSound();
                    }
                });
                
                // 环境音效 - 随机恐怖声音
                if (Math.random() < 0.005) {
                    playAmbientSound();
                }
                
                // 更新灵魂碎片动画
                collectibles.forEach(item => {
                    if (item.type === 'soul' && !item.collected) {
                        item.rotation += delta;
                        item.mesh.rotation.y = item.rotation;
                        item.mesh.position.y = item.y + Math.sin(item.rotation * 2) * 0.1;
                    }
                });
                
                // 更新蜡烛闪烁
                candles.forEach(candle => {
                    const flicker = 0.8 + Math.random() * 0.4;
                    candle.light.intensity = candle.baseIntensity * flicker;
                    candle.flame.scale.y = flicker;
                });
                
                // 理智值随时间减少
                sanity -= delta * 0.5;
                if (sanity <= 0) {
                    sanity = 0;
                    endGame(false);
                }
                
                // 检查收集物
                checkCollectibles();
                
                // 更新UI
                updateUI();
                drawMinimap();
            }
            
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初始化
        initScene();
        animate();
    </script>
</body>
</html>
