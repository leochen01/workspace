<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧟 双人打僵尸大战 - 谁是僵尸猎人？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 50%, #1a0a0a 100%);
            font-family: 'Arial', sans-serif;
            padding: 15px;
            overflow-x: hidden;
        }

        h1 {
            color: #ff4444;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .game-header {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 20px;
            border-radius: 12px;
            min-width: 180px;
            text-align: center;
        }

        .player-info.p1 {
            border: 3px solid #00ff88;
        }

        .player-info.p2 {
            border: 3px solid #ff6b6b;
        }

        .player-info h3 {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .player-info.p1 h3 {
            color: #00ff88;
        }

        .player-info.p2 h3 {
            color: #ff6b6b;
        }

        .player-info .score {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
        }

        .player-info.p1 .score {
            color: #00ff88;
        }

        .player-info.p2 .score {
            color: #ff6b6b;
        }

        .wave-info {
            background: rgba(255, 215, 0, 0.2);
            padding: 10px 25px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            text-align: center;
            min-width: 150px;
        }

        .wave-info h4 {
            color: #ffd700;
            font-size: 0.95rem;
        }

        .wave-info .wave {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        canvas {
            border: 4px solid #ff4444;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
            background: #0a0a0a;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .control-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .control-box h4 {
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .control-box.p1 h4 {
            color: #00ff88;
        }

        .control-box.p2 h4 {
            color: #ff6b6b;
        }

        .control-box p {
            color: #aaa;
            font-size: 0.85rem;
        }

        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.6);
        }

        .reset-btn {
            background: linear-gradient(135deg, #ffd700, #ccaa00);
            color: #1a0a0a;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        .winner-display {
            margin-top: 15px;
            font-size: 2rem;
            font-weight: bold;
            min-height: 45px;
        }

        .winner-display.p1-wins {
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.7);
        }

        .winner-display.p2-wins {
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.7);
        }

        .legend {
            margin-top: 15px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            color: #aaa;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 8px;
        }

        .game-container {
            position: relative;
        }
    </style>
</head>
<body>
    <h1>🧟 双人打僵尸大战 🧟</h1>
    
    <div class="game-header">
        <div class="player-info p1">
            <h3>🎮 玩家1 (绿色)</h3>
            <div class="score" id="score1">0</div>
        </div>
        <div class="wave-info">
            <h4>🌊 波次</h4>
            <div class="wave" id="wave">1</div>
        </div>
        <div class="player-info p2">
            <h3>🎮 玩家2 (红色)</h3>
            <div class="score" id="score2">0</div>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="game-over-overlay" id="gameOverlay">
            <div class="winner-display" id="winnerDisplay"></div>
        </div>
    </div>

    <div class="controls">
        <div class="control-box p1">
            <h4>玩家1控制</h4>
            <p>WASD 移动 | 空格 射击</p>
        </div>
        <div class="control-box p2">
            <h4>玩家2控制</h4>
            <p>方向键 移动 | Enter 射击</p>
        </div>
    </div>

    <div class="buttons">
        <button class="start-btn" onclick="startGame()">🚀 开始战斗</button>
        <button class="reset-btn" onclick="resetGame()">🔄 重新开始</button>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #00ff88"></div>
            <span>玩家1</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff6b6b"></div>
            <span>玩家2</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #666666"></div>
            <span>普通僵尸 (+10分)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #8844ff"></div>
            <span>强化僵尸 (+30分)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff8800"></div>
            <span>自爆僵尸 (+20分)</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('gameOverlay');
        const winnerDisplay = document.getElementById('winnerDisplay');

        // 设置画布大小
        canvas.width = 900;
        canvas.height = 550;

        // 游戏状态
        let gameRunning = false;
        let gameLoop = null;
        let wave = 1;
        let zombiesKilled = { p1: 0, p2: 0 };
        let zombiesPerWave = 10;
        
        // 音频
        let audioCtx = null;
        let masterGain = null;

        // 按键状态
        const keys = {};

        // 粒子效果
        const particles = [];

        // 僵尸列表
        let zombies = [];

        // 玩家1
        const player1 = {
            x: 200,
            y: canvas.height / 2,
            radius: 18,
            color: '#00ff88',
            speed: 4,
            bullets: [],
            cooldown: 0,
            score: 0,
            angle: 0
        };

        // 玩家2
        const player2 = {
            x: canvas.width - 200,
            y: canvas.height / 2,
            radius: 18,
            color: '#ff6b6b',
            speed: 4,
            bullets: [],
            cooldown: 0,
            score: 0,
            angle: Math.PI
        };

        // 初始化音频
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.25;
            masterGain.connect(audioCtx.destination);
        }

        // 播放射击音效
        function playShootSound(isPlayer1) {
            if (!audioCtx || !masterGain) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(isPlayer1 ? 880 : 660, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.08);
            
            const panPos = isPlayer1 
                ? (player1.x / canvas.width) * 2 - 1 
                : (player2.x / canvas.width) * 2 - 1;
            panner.pan.value = Math.max(-1, Math.min(1, panPos));
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(panner);
            panner.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 播放僵尸死亡音效
        function playZombieDeathSound(type) {
            if (!audioCtx || !masterGain) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (type === 'exploder') {
                // 自爆僵尸
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            } else if (type === 'strong') {
                // 强化僵尸
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            } else {
                // 普通僵尸
                osc.type = 'square';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            }
            
            osc.connect(gain);
            gain.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // 播放胜利音效
        function playWinSound(isPlayer1) {
            if (!audioCtx || !masterGain) return;
            
            const notes = isPlayer1 
                ? [523, 659, 784, 1047, 784, 1047]
                : [392, 494, 587, 784, 587, 784];
            
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }, i * 120);
            });
        }

        // 创建粒子效果
        function createParticles(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1,
                    color: color,
                    size: Math.random() * 5 + 2,
                    decay: 0.02 + Math.random() * 0.02
                });
            }
        }

        // 创建僵尸
        function spawnZombie() {
            if (zombies.length >= 30) return;

            const side = Math.floor(Math.random() * 4);
            let x, y;

            switch(side) {
                case 0: // 左
                    x = -30;
                    y = Math.random() * canvas.height;
                    break;
                case 1: // 右
                    x = canvas.width + 30;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // 上
                    x = Math.random() * canvas.width;
                    y = -30;
                    break;
                case 3: // 下
                    x = Math.random() * canvas.width;
                    y = canvas.height + 30;
                    break;
            }

            // 僵尸类型
            const rand = Math.random();
            let type, color, speed, health, points, size;

            if (rand < 0.6) {
                type = 'normal';
                color = '#666666';
                speed = 1 + Math.random() * 0.5 + wave * 0.1;
                health = 1;
                points = 10;
                size = 16;
            } else if (rand < 0.85) {
                type = 'strong';
                color = '#8844ff';
                speed = 0.7 + Math.random() * 0.3 + wave * 0.08;
                health = 3;
                points = 30;
                size = 22;
            } else {
                type = 'exploder';
                color = '#ff8800';
                speed = 1.5 + Math.random() * 0.5 + wave * 0.12;
                health = 1;
                points = 20;
                size = 14;
            }

            zombies.push({
                x, y,
                radius: size,
                color,
                speed,
                health,
                maxHealth: health,
                points,
                type,
                angle: 0
            });
        }

        // 更新僵尸
        function updateZombies() {
            // 找到最近的玩家并移动
            zombies.forEach(zombie => {
                const dist1 = Math.hypot(player1.x - zombie.x, player1.y - zombie.y);
                const dist2 = Math.hypot(player2.x - zombie.x, player2.y - zombie.y);
                
                let target = dist1 < dist2 ? player1 : player2;
                
                const angle = Math.atan2(target.y - zombie.y, target.x - zombie.x);
                zombie.angle = angle;
                
                zombie.x += Math.cos(angle) * zombie.speed;
                zombie.y += Math.sin(angle) * zombie.speed;

                // 检查是否碰到玩家
                if (dist1 < zombie.radius + player1.radius) {
                    // 碰到玩家1 - 简单反弹
                    zombie.x -= Math.cos(angle) * zombie.speed * 3;
                    zombie.y -= Math.sin(angle) * zombie.speed * 3;
                }
                if (dist2 < zombie.radius + player2.radius) {
                    zombie.x -= Math.cos(angle) * zombie.speed * 3;
                    zombie.y -= Math.sin(angle) * zombie.speed * 3;
                }
            });
        }

        // 绘制僵尸
        function drawZombies() {
            zombies.forEach(zombie => {
                const time = Date.now() / 200;
                
                // 发光效果
                ctx.shadowColor = zombie.color;
                ctx.shadowBlur = 10;
                
                ctx.fillStyle = zombie.color;
                ctx.beginPath();
                ctx.arc(zombie.x, zombie.y, zombie.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 僵尸眼睛
                ctx.fillStyle = '#ff0000';
                const eyeOffset = zombie.radius * 0.3;
                ctx.beginPath();
                ctx.arc(
                    zombie.x + Math.cos(zombie.angle - 0.5) * eyeOffset,
                    zombie.y + Math.sin(zombie.angle - 0.5) * eyeOffset,
                    4, 0, Math.PI * 2
                );
                ctx.arc(
                    zombie.x + Math.cos(zombie.angle + 0.5) * eyeOffset,
                    zombie.y + Math.sin(zombie.angle + 0.5) * eyeOffset,
                    4, 0, Math.PI * 2
                );
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 强化僵尸血条
                if (zombie.maxHealth > 1) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(zombie.x - zombie.radius, zombie.y - zombie.radius - 8, zombie.radius * 2, 4);
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(zombie.x - zombie.radius, zombie.y - zombie.radius - 8, 
                        (zombie.health / zombie.maxHealth) * zombie.radius * 2, 4);
                }
            });
        }

        // 绘制玩家
        function drawPlayer(player, isPlayer1) {
            // 发光效果
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 玩家方向指示
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(
                player.x + Math.cos(player.angle) * player.radius * 1.5,
                player.y + Math.sin(player.angle) * player.radius * 1.5
            );
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            
            // 玩家编号
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(isPlayer1 ? 'P1' : 'P2', player.x, player.y + 5);
        }

        // 绘制子弹
        function drawBullets(player) {
            player.bullets.forEach(bullet => {
                ctx.fillStyle = player.color;
                ctx.shadowColor = player.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius || 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // 更新子弹
        function updateBullets(player, isPlayer1) {
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                const bullet = player.bullets[i];
                bullet.x += Math.cos(bullet.angle) * bullet.speed;
                bullet.y += Math.sin(bullet.angle) * bullet.speed;
                
                // 检查是否出界
                if (bullet.x < 0 || bullet.x > canvas.width || 
                    bullet.y < 0 || bullet.y > canvas.height) {
                    player.bullets.splice(i, 1);
                    continue;
                }
                
                // 检查是否击中僵尸
                for (let j = zombies.length - 1; j >= 0; j--) {
                    const zombie = zombies[j];
                    const dist = Math.hypot(bullet.x - zombie.x, bullet.y - zombie.y);
                    
                    if (dist < zombie.radius + (bullet.radius || 5)) {
                        player.bullets.splice(i, 1);
                        zombie.health--;
                        
                        // 击中效果
                        createParticles(bullet.x, bullet.y, zombie.color, 8);
                        
                        if (zombie.health <= 0) {
                            playZombieDeathSound(zombie.type);
                            createParticles(zombie.x, zombie.y, zombie.color, 20);
                            
                            player.score += zombie.points;
                            zombiesKilled[isPlayer1 ? 'p1' : 'p2']++;
                            
                            if (isPlayer1) {
                                document.getElementById('score1').textContent = player.score;
                            } else {
                                document.getElementById('score2').textContent = player.score;
                            }
                            
                            zombies.splice(j, 1);
                        }
                        break;
                    }
                }
            }
        }

        // 更新粒子
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life -= p.decay || 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // 更新玩家
        function updatePlayer(player, upKey, downKey, leftKey, rightKey) {
            // 移动
            if (keys[upKey] && player.y > player.radius) {
                player.y -= player.speed;
            }
            if (keys[downKey] && player.y < canvas.height - player.radius) {
                player.y += player.speed;
            }
            if (keys[leftKey] && player.x > player.radius) {
                player.x -= player.speed;
            }
            if (keys[rightKey] && player.x < canvas.width - player.radius) {
                player.x += player.speed;
            }

            // 冷却
            if (player.cooldown > 0) {
                player.cooldown--;
            }
        }

        // 射击
        function shoot(player, isPlayer1) {
            if (player.cooldown === 0) {
                player.bullets.push({
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                    speed: 12,
                    radius: 5
                });
                player.cooldown = 8;
                playShootSound(isPlayer1);
                createParticles(
                    player.x + Math.cos(player.angle) * player.radius,
                    player.y + Math.sin(player.angle) * player.radius,
                    player.color,
                    5
                );
            }
        }

        // 主更新循环
        function update() {
            if (!gameRunning) {
                draw();
                drawParticles();
                return;
            }

            // 生成僵尸
            if (Math.random() < 0.02 + wave * 0.005) {
                spawnZombie();
            }

            // 更新玩家
            updatePlayer(player1, 'KeyW', 'KeyS', 'KeyA', 'KeyD');
            updatePlayer(player2, 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');

            // 更新子弹
            updateBullets(player1, true);
            updateBullets(player2, false);

            // 更新僵尸
            updateZombies();

            // 更新粒子
            updateParticles();

            // 绘制
            draw();
            drawParticles();

            // 检查波次
            const totalKilled = zombiesKilled.p1 + zombiesKilled.p2;
            if (totalKilled >= zombiesPerWave * wave) {
                wave++;
                document.getElementById('wave').textContent = wave;
                // 波次奖励
                player1.score += 50;
                player2.score += 50;
                document.getElementById('score1').textContent = player1.score;
                document.getElementById('score2').textContent = player2.score;
            }
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格背景
            ctx.strokeStyle = 'rgba(50, 50, 50, 0.3)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 绘制子弹
            drawBullets(player1);
            drawBullets(player2);

            // 绘制僵尸
            drawZombies();

            // 绘制玩家
            drawPlayer(player1, true);
            drawPlayer(player2, false);
        }

        function startGame() {
            if (!audioCtx) initAudio();
            
            if (gameRunning) return;
            gameRunning = true;
            
            overlay.style.display = 'none';
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 1000 / 60);
        }

        function resetGame() {
            gameRunning = false;
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }

            // 重置玩家
            player1.x = 200;
            player1.y = canvas.height / 2;
            player1.bullets = [];
            player1.cooldown = 0;
            player1.score = 0;
            player1.angle = 0;

            player2.x = canvas.width - 200;
            player2.y = canvas.height / 2;
            player2.bullets = [];
            player2.cooldown = 0;
            player2.score = 0;
            player2.angle = Math.PI;

            // 重置游戏状态
            wave = 1;
            zombies = [];
            zombiesKilled = { p1: 0, p2: 0 };
            particles.length = 0;

            // 更新UI
            document.getElementById('score1').textContent = '0';
            document.getElementById('score2').textContent = '0';
            document.getElementById('wave').textContent = '1';
            overlay.style.display = 'none';

            draw();
        }

        function endGame(winner) {
            gameRunning = false;
            if (gameLoop) clearInterval(gameLoop);
            
            playWinSound(winner === 'p1');
            
            overlay.style.display = 'flex';
            
            if (winner === 'p1') {
                winnerDisplay.textContent = `🎉 玩家1 获胜！得分: ${player1.score} vs ${player2.score}`;
                winnerDisplay.className = 'winner-display p1-wins';
            } else {
                winnerDisplay.textContent = `🎉 玩家2 获胜！得分: ${player2.score} vs ${player1.score}`;
                winnerDisplay.className = 'winner-display p2-wins';
            }
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            // 玩家1: WASD + 空格
            switch(e.code) {
                case 'KeyW': case 'KeyA': case 'KeyS': case 'KeyD':
                    updatePlayerAngle(player1, e.code);
                    break;
                case 'Space':
                    shoot(player1, true);
                    break;
            }

            // 玩家2: 方向键 + Enter
            switch(e.code) {
                case 'ArrowUp': case 'ArrowLeft': case 'ArrowDown': case 'ArrowRight':
                    updatePlayerAngle(player2, e.code);
                    break;
                case 'Enter':
                    shoot(player2, false);
                    break;
            }

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Enter'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 更新玩家朝向
        function updatePlayerAngle(player, key) {
            switch(key) {
                case 'KeyW': case 'ArrowUp':
                    player.angle = -Math.PI / 2;
                    break;
                case 'KeyS': case 'ArrowDown':
                    player.angle = Math.PI / 2;
                    break;
                case 'KeyA': case 'ArrowLeft':
                    player.angle = Math.PI;
                    break;
                case 'KeyD': case 'ArrowRight':
                    player.angle = 0;
                    break;
            }
        }

        // 鼠标瞄准支持
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 更新两个玩家的朝向（都朝向鼠标）
            const angle1 = Math.atan2(mouseY - player1.y, mouseX - player1.x);
            const angle2 = Math.atan2(mouseY - player2.y, mouseX - player2.x);
            
            // 稍微平滑过渡
            player1.angle = angle1;
            player2.angle = angle2;
        });

        // 初始化
        resetGame();
    </script>
</body>
</html>
